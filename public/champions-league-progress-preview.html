<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Champions League Progress Preview</title>
    <link rel="stylesheet" href="list-progress-preview.css" />
  </head>
  <body>
    <main class="page" aria-label="Champions League progress tracking preview">
      <section class="hero" aria-label="CookieRun OvenBreak">
        <img class="hero-background" src="images/homepage-banner-current.png" alt="" />
        <img class="hero-title" src="images/title.png" alt="CookieRun OvenBreak" />
        <nav class="hero-nav" aria-label="Main navigation">
          <button type="button">home</button>
          <button type="button">to-do</button>
          <button type="button">cookies</button>
        </nav>
      </section>

      <header class="page-header">
        <h1>Champions League</h1>
      </header>

      <div class="section-stack">
        <section>
          <div class="block-grid">
            <article class="block">
              <h2 class="arena-title">Arena 1</h2>
              <div class="combi">
                <div class="treasures">
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                  <div class="slot treasure filled" data-rarity="epic"><div class="art-wrap"><img class="item-art" src="images/treasures/epic/111-twirling-timepiece.png" alt="Twirling Timepiece" /></div><div class="level-control"><span class="level-text">Lv.4/<span class="level-target">5</span></span></div></div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                </div>
                <div class="slot pet filled" data-rarity="rare"><div class="art-wrap"><img class="item-art" src="images/item-frame-preview/rare-pet.webp" alt="Rare pet placeholder" /></div><div class="level-control"><span class="level-text is-complete">Lv.7/<span class="level-target">7</span></span></div></div>
                <div class="slot cookie filled" data-rarity="epic"><div class="art-wrap"><img class="item-art" src="images/cookies/epic/190-dark-fondue-cookie.webp" alt="Dark Fondue Cookie" /></div><div class="level-control"><span class="level-text">Lv.6/<span class="level-target">7</span></span></div></div>
                <div class="slot relay empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add relay.png?v=2026-06-16-relay-2" alt="Add relay cookie" /></div></div>
              </div>
            </article>

            <article class="block">
              <h2 class="arena-title">Arena 2</h2>
              <div class="combi">
                <div class="treasures">
                  <div class="slot treasure filled" data-rarity="legendary"><div class="art-wrap"><img class="item-art" src="images/treasures/legendary/8-dread-grasp-of-darkness.png" alt="Dread Grasp of Darkness" /></div><div class="level-control"><span class="level-text">Lv.7/<span class="level-target">9</span></span></div></div>
                  <div class="slot treasure filled" data-rarity="epic"><div class="art-wrap"><img class="item-art" src="images/treasures/epic/112-doughy-rolling-pin.png" alt="Doughy Rolling Pin" /></div><div class="level-control"><span class="level-text is-complete">Lv.9/<span class="level-target">9</span></span></div></div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                </div>
                <div class="slot pet empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add pet.png" alt="Add pet" /></div></div>
                <div class="slot cookie filled" data-rarity="legendary"><div class="art-wrap"><img class="item-art" src="images/cookies/legendary/8-timekeeper-cookie.webp" alt="Timekeeper Cookie" /></div><div class="level-control"><span class="level-text">Lv.9/<span class="level-target">11</span></span></div></div>
                <div class="slot relay filled" data-rarity="epic"><div class="art-wrap"><img class="item-art" src="images/cookies/epic/194-agar-agar-cookie.webp" alt="Agar Agar Cookie" /></div><div class="level-control"><span class="level-text">Lv.8/<span class="level-target">11</span></span></div></div>
              </div>
            </article>

            <article class="block">
              <h2 class="arena-title">Arena 3</h2>
              <div class="combi">
                <div class="treasures">
                  <div class="slot treasure filled" data-rarity="epic"><div class="art-wrap"><img class="item-art" src="images/treasures/epic/111-twirling-timepiece.png" alt="Twirling Timepiece" /></div><div class="level-control"><span class="level-text">Lv.5/<span class="level-target">12</span></span></div></div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                  <div class="slot treasure filled" data-rarity="epic"><div class="art-wrap"><img class="item-art" src="images/treasures/epic/112-doughy-rolling-pin.png" alt="Doughy Rolling Pin" /></div><div class="level-control"><span class="level-text">Lv.11/<span class="level-target">12</span></span></div></div>
                </div>
                <div class="slot pet filled" data-rarity="epic"><div class="art-wrap"><img class="item-art" src="images/cookies/epic/195-chonky-cake-wolf.png" alt="Chonky Cake Wolf" /></div><div class="level-control"><span class="level-text">Lv.12/<span class="level-target">15</span></span></div></div>
                <div class="slot cookie empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add cookie.png" alt="Add main cookie" /></div></div>
                <div class="slot relay filled" data-rarity="common"><div class="art-wrap"><img class="item-art" src="images/item-frame-preview/common-cookie.webp" alt="Common relay placeholder" /></div><div class="level-control"><span class="level-text">Lv.3/<span class="level-target">15</span></span></div></div>
              </div>
            </article>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
