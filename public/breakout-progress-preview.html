<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Breakout Progress Preview</title>
    <link rel="stylesheet" href="list-progress-preview.css" />
  </head>
  <body>
    <main class="page breakout-preview" aria-label="Breakout progress tracking preview">
      <section class="hero" aria-label="CookieRun OvenBreak">
        <img class="hero-background" src="images/homepage-banner-current.png" alt="" />
        <img class="hero-title" src="images/title.png" alt="CookieRun OvenBreak" />
        <nav class="hero-nav" aria-label="Main navigation">
          <button type="button">home</button>
          <button type="button">to-do</button>
          <button type="button">cookies</button>
        </nav>
      </section>

      <header class="page-header">
        <h1>Breakout</h1>
      </header>

      <div class="section-stack">
        <section class="breakout-group">
          <div class="heading-row group-heading">
            <h2 class="section-title">Group 1</h2>
            <button class="heading-edit edit-group" type="button" aria-label="Edit Group 1 combi count">
              <img class="heading-edit-icon" src="../assets/ovenbreak images/free assets/pen.png" alt="" aria-hidden="true" />
            </button>
          </div>
          <div class="breakout-panel">
            <div class="block-grid">
              <article class="block" aria-label="Combi 1">
              <div class="combi no-relay">
                <div class="treasures">
                  <div class="slot treasure filled" data-rarity="legendary">
                    <div class="art-wrap"><img class="item-art" src="images/treasures/legendary/8-dread-grasp-of-darkness.png" alt="Dread Grasp of Darkness" /></div>
                    <div class="level-control"><span class="level-text">Lv.8/<span class="level-target">12</span></span></div>
                  </div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                  <div class="slot treasure filled" data-rarity="epic">
                    <div class="art-wrap"><img class="item-art" src="images/treasures/epic/111-twirling-timepiece.png" alt="Twirling Timepiece" /></div>
                    <div class="level-control"><span class="level-text is-complete">Lv.12/<span class="level-target">12</span></span></div>
                  </div>
                </div>
                <div class="slot pet filled" data-rarity="epic">
                  <div class="art-wrap"><img class="item-art" src="images/cookies/epic/195-chonky-cake-wolf.png" alt="Chonky Cake Wolf" /></div>
                  <div class="level-control"><span class="level-text">Lv.10/<span class="level-target">15</span></span></div>
                </div>
                <span class="combi-flag" aria-hidden="true">
                  <img src="../assets/ovenbreak images/add cookies/flag.png" alt="" />
                  <span class="combi-flag-number">1</span>
                </span>
                <div class="slot cookie filled" data-rarity="epic">
                  <div class="art-wrap"><img class="item-art" src="images/cookies/epic/195-red-velvet.png" alt="Red Velvet Cookie" /></div>
                  <div class="level-control"><span class="level-text">Lv.13/<span class="level-target">15</span></span></div>
                </div>
              </div>
              </article>

              <article class="block" aria-label="Combi 2">
              <div class="combi no-relay">
                <div class="treasures">
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                  <div class="slot treasure filled" data-rarity="epic">
                    <div class="art-wrap"><img class="item-art" src="images/treasures/epic/112-doughy-rolling-pin.png" alt="Doughy Rolling Pin" /></div>
                    <div class="level-control"><span class="level-text">Lv.5/<span class="level-target">12</span></span></div>
                  </div>
                </div>
                <div class="slot pet empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add pet.png" alt="Add pet" /></div></div>
                <span class="combi-flag" aria-hidden="true">
                  <img src="../assets/ovenbreak images/add cookies/flag.png" alt="" />
                  <span class="combi-flag-number">2</span>
                </span>
                <div class="slot cookie filled" data-rarity="legendary">
                  <div class="art-wrap"><img class="item-art" src="images/cookies/legendary/8-timekeeper-cookie.webp" alt="Timekeeper Cookie" /></div>
                  <div class="level-control"><span class="level-text is-complete">Lv.15/<span class="level-target">15</span></span></div>
                </div>
              </div>
              </article>

              <article class="block" aria-label="Combi 3">
              <div class="combi no-relay">
                <div class="treasures">
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                </div>
                <div class="slot pet filled" data-rarity="rare">
                  <div class="art-wrap"><img class="item-art" src="images/item-frame-preview/rare-pet.webp" alt="Rare pet placeholder" /></div>
                  <div class="level-control"><span class="level-text">Lv.4/<span class="level-target">15</span></span></div>
                </div>
                <span class="combi-flag" aria-hidden="true">
                  <img src="../assets/ovenbreak images/add cookies/flag.png" alt="" />
                  <span class="combi-flag-number">3</span>
                </span>
                <div class="slot cookie empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add cookie.png" alt="Add main cookie" /></div></div>
              </div>
              </article>
            </div>
          </div>
        </section>

        <section class="breakout-group">
          <div class="heading-row group-heading">
            <h2 class="section-title">Group 2</h2>
            <button class="heading-edit edit-group" type="button" aria-label="Edit Group 2 combi count">
              <img class="heading-edit-icon" src="../assets/ovenbreak images/free assets/pen.png" alt="" aria-hidden="true" />
            </button>
          </div>
          <div class="breakout-panel">
            <div class="block-grid">
              <article class="block" aria-label="Combi 1">
              <div class="combi no-relay">
                <div class="treasures">
                  <div class="slot treasure filled" data-rarity="epic"><div class="art-wrap"><img class="item-art" src="images/treasures/epic/111-twirling-timepiece.png" alt="Twirling Timepiece" /></div><div class="level-control"><span class="level-text">Lv.9/<span class="level-target">12</span></span></div></div>
                  <div class="slot treasure filled" data-rarity="legendary"><div class="art-wrap"><img class="item-art" src="images/treasures/legendary/8-dread-grasp-of-darkness.png" alt="Dread Grasp of Darkness" /></div><div class="level-control"><span class="level-text">Lv.2/<span class="level-target">12</span></span></div></div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                </div>
                <div class="slot pet filled" data-rarity="common"><div class="art-wrap"><img class="item-art" src="images/item-frame-preview/common-pet.webp" alt="Common pet placeholder" /></div><div class="level-control"><span class="level-text">Lv.3/<span class="level-target">15</span></span></div></div>
                <span class="combi-flag" aria-hidden="true">
                  <img src="../assets/ovenbreak images/add cookies/flag.png" alt="" />
                  <span class="combi-flag-number">1</span>
                </span>
                <div class="slot cookie filled" data-rarity="rare"><div class="art-wrap"><img class="item-art" src="images/item-frame-preview/rare-cookie.webp" alt="Rare cookie placeholder" /></div><div class="level-control"><span class="level-text">Lv.6/<span class="level-target">15</span></span></div></div>
              </div>
              </article>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div class="preview-modal" id="group-modal" aria-hidden="true">
      <section class="preview-dialog" role="dialog" aria-modal="true" aria-labelledby="group-dialog-title">
        <div class="preview-dialog-header">
          <h2 class="preview-dialog-title" id="group-dialog-title">Edit Group</h2>
          <button class="preview-close group-close" type="button" aria-label="Close group editor">x</button>
        </div>
        <div class="preview-dialog-body">
          <p class="preview-dialog-text">Choose how many combis this Breakout group shows.</p>
          <span class="preview-field-label">Combis</span>
          <div class="preview-stepper">
            <button class="preview-step group-step" type="button" data-direction="-1" aria-label="Decrease combi count">-</button>
            <span class="preview-value" id="group-count-value">3</span>
            <button class="preview-step group-step" type="button" data-direction="1" aria-label="Increase combi count">+</button>
          </div>
          <div class="preview-actions">
            <button class="preview-action apply-group-count" type="button">Apply</button>
          </div>
        </div>
      </section>
    </div>

    <script>
      const groupModal = document.querySelector("#group-modal");
      const groupDialogTitle = document.querySelector("#group-dialog-title");
      const groupCountValue = document.querySelector("#group-count-value");
      const groupClose = document.querySelector(".group-close");
      const groupApply = document.querySelector(".apply-group-count");
      const groupSteps = Array.from(document.querySelectorAll(".group-step"));
      let activeGroup = null;
      let pendingGroupCount = 1;

      function refreshGroupStepper() {
        groupCountValue.textContent = pendingGroupCount;
        groupSteps.forEach((button) => {
          const direction = Number(button.dataset.direction);
          button.disabled = direction < 0 ? pendingGroupCount <= 1 : pendingGroupCount >= 15;
        });
      }

      function emptyCombiMarkup(number) {
        return `
              <article class="block" aria-label="Combi ${number}">
              <div class="combi no-relay">
                <div class="treasures">
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                </div>
                <div class="slot pet empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add pet.png" alt="Add pet" /></div></div>
                <span class="combi-flag" aria-hidden="true">
                  <img src="../assets/ovenbreak images/add cookies/flag.png" alt="" />
                  <span class="combi-flag-number">${number}</span>
                </span>
                <div class="slot cookie empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add cookie.png" alt="Add main cookie" /></div></div>
              </div>
              </article>`;
      }

      function groupBlocks(group) {
        return Array.from(group.querySelectorAll(".block"));
      }

      function refreshGroupNumbers(group) {
        groupBlocks(group).forEach((block, index) => {
          const number = index + 1;
          block.setAttribute("aria-label", `Combi ${number}`);
          const flagNumber = block.querySelector(".combi-flag-number");
          if (flagNumber) {
            flagNumber.textContent = number;
          }
        });
      }

      function setGroupCount(group, count) {
        const grid = group.querySelector(".block-grid");
        let blocks = groupBlocks(group);
        while (blocks.length > count) {
          blocks.pop().remove();
        }
        while (blocks.length < count) {
          grid.insertAdjacentHTML("beforeend", emptyCombiMarkup(blocks.length + 1));
          blocks = groupBlocks(group);
        }
        refreshGroupNumbers(group);
      }

      function openGroupEditor(group) {
        activeGroup = group;
        pendingGroupCount = groupBlocks(group).length;
        const title = group.querySelector(".section-title").textContent.trim();
        groupDialogTitle.textContent = `${title} Combis`;
        refreshGroupStepper();
        groupModal.classList.add("is-open");
        groupModal.setAttribute("aria-hidden", "false");
        groupClose.focus();
      }

      function closeGroupEditor() {
        groupModal.classList.remove("is-open");
        groupModal.setAttribute("aria-hidden", "true");
        activeGroup = null;
      }

      document.querySelectorAll(".edit-group").forEach((button) => {
        button.addEventListener("click", () => openGroupEditor(button.closest(".breakout-group")));
      });

      groupSteps.forEach((button) => {
        button.addEventListener("click", () => {
          pendingGroupCount = Math.max(1, Math.min(15, pendingGroupCount + Number(button.dataset.direction)));
          refreshGroupStepper();
        });
      });

      groupApply.addEventListener("click", () => {
        if (activeGroup) {
          setGroupCount(activeGroup, pendingGroupCount);
        }
        closeGroupEditor();
      });

      groupClose.addEventListener("click", closeGroupEditor);
      groupModal.addEventListener("click", (event) => {
        if (event.target === groupModal) {
          closeGroupEditor();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && groupModal.classList.contains("is-open")) {
          closeGroupEditor();
        }
      });
    </script>
  </body>
</html>
