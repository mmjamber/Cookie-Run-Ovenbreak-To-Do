<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Item Frame Preview</title>
    <style>
      @font-face {
        font-family: "CookieRun";
        src: url("../../fonts/CookieRun Black.otf") format("opentype");
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --bg-pink: #f4bfd9;
        --legendary: #20d7d4;
        --epic: #862894;
        --rare: #28719e;
        --common: #9a633d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 32px;
        background-color: var(--bg-pink);
        background-image:
          radial-gradient(circle, #ffffff 5px, transparent 5.5px),
          radial-gradient(circle, #ffffff 5px, transparent 5.5px);
        background-position:
          0 0,
          22px 22px;
        background-size: 44px 44px;
        font-family: "CookieRun", Arial, sans-serif;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 210px));
        gap: 24px;
        width: min(100%, 1440px);
      }

      .item-card {
        display: grid;
        gap: 12px;
        justify-items: center;
        padding: 18px;
      }

      .item-frame {
        display: grid;
        place-items: center;
        position: relative;
        width: 150px;
        height: 150px;
        border: 8px solid transparent;
        border-radius: 22px;
        background: transparent;
      }

      .item-frame.legendary {
        border-width: 0;
        background: transparent;
      }

      .item-frame.legendary::before {
        content: "";
        position: absolute;
        inset: 0;
        padding: 8px;
        border-radius: inherit;
        background: linear-gradient(
          135deg,
          hsl(55deg 90% 67%) 0%,
          hsl(173deg 87% 59%) 48%,
          hsl(286deg 100% 61%) 100%
        );
        pointer-events: none;
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        mask-composite: exclude;
      }

      .item-frame.epic {
        border-color: var(--epic);
      }

      .item-frame.rare {
        border-color: var(--rare);
      }

      .item-frame.common {
        border-color: var(--common);
      }

      .item-frame.no-frame {
        border-color: transparent;
      }

      .item-frame img {
        position: relative;
        z-index: 1;
        max-width: 136px;
        max-height: 136px;
        object-fit: contain;
      }

      .item-name {
        margin: 0;
        color: #ffffff;
        font-size: 22px;
        font-weight: 800;
        line-height: 1.1;
        text-align: center;
        -webkit-text-stroke: 1px #000000;
      }

      @media (max-width: 720px) {
        .preview-grid {
          grid-template-columns: 1fr;
        }

        .item-card {
          grid-template-columns: 132px 1fr;
          align-items: center;
          justify-items: start;
        }

        .item-frame {
          width: 120px;
          height: 120px;
          border-radius: 18px;
        }

        .item-frame img {
          max-width: 108px;
          max-height: 108px;
        }

        .item-name {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-grid" aria-label="Item frame preview">
      <section class="item-card">
        <div class="item-frame legendary">
          <img
            src="../../ovenbreak images/cookies/legendary/0_Moonlight_Cookie.webp"
            alt="Moonlight Cookie"
          />
        </div>
        <div>
          <p class="item-name">Cookie</p>
        </div>
      </section>

      <section class="item-card">
        <div class="item-frame epic">
          <img
            src="../../ovenbreak images/cookies/epic/104_Playful_Herbert.webp"
            alt="Playful Herbert"
          />
        </div>
        <div>
          <p class="item-name">Pet</p>
        </div>
      </section>

      <section class="item-card">
        <div class="item-frame rare">
          <img
            src="../../ovenbreak images/cookies/rare/0_Zombie_Cookie.webp"
            alt="Zombie Cookie"
          />
        </div>
        <div>
          <p class="item-name">Cookie</p>
        </div>
      </section>

      <section class="item-card">
        <div class="item-frame epic">
          <img
            src="../../ovenbreak images/cookies/epic/104_Bellflower_Cookie.webp"
            alt="Bellflower Cookie"
          />
        </div>
        <div>
          <p class="item-name">Cookie</p>
        </div>
      </section>

      <section class="item-card">
        <div class="item-frame common">
          <img
            src="../../ovenbreak images/cookies/common/0_GingerBrave.webp"
            alt="GingerBrave"
          />
        </div>
        <div>
          <p class="item-name">Cookie</p>
        </div>
      </section>

      <section class="item-card">
        <div class="item-frame common">
          <img
            src="../../ovenbreak images/cookies/common/1_GingerBright.webp"
            alt="GingerBright"
          />
        </div>
        <div>
          <p class="item-name">Cookie</p>
        </div>
      </section>

      <section class="item-card">
        <div class="item-frame legendary">
          <img
            src="../../ovenbreak images/cookies/legendary/0_Dreamcatcher.webp"
            alt="Dreamcatcher"
          />
        </div>
        <div>
          <p class="item-name">Pet</p>
        </div>
      </section>

      <section class="item-card">
        <div class="item-frame common">
          <img
            src="../../ovenbreak images/cookies/common/0_Choco_Drop.webp"
            alt="Choco Drop"
          />
        </div>
        <div>
          <p class="item-name">Pet</p>
        </div>
      </section>

      <section class="item-card">
        <div class="item-frame no-frame">
          <img
            src="../../ovenbreak images/treasures/legendary/0_Essence_of_conflagration.png"
            alt="Essence of Conflagration"
          />
        </div>
        <div>
          <p class="item-name">Treasure</p>
        </div>
      </section>
    </main>
  </body>
</html>
