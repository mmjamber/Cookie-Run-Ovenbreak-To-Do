<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Progress Text Preview</title>
    <style>
      @font-face {
        font-family: "CookieRun";
        src: url("/fonts/CookieRun-Black.otf") format("opentype");
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --outline: #351d12;
        --fill: #ffffff;
        --bg: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        background: var(--bg);
      }

      .preview-text {
        width: min(92vw, 1100px);
        height: auto;
        overflow: visible;
      }

      .progress-text {
        font-family: "CookieRun", Arial, sans-serif;
        font-size: 86px;
        font-weight: 900;
        letter-spacing: 0;
        stroke: var(--outline);
        stroke-width: 8px;
        stroke-linejoin: round;
        paint-order: stroke fill;
      }
    </style>
  </head>
  <body>
    <svg
      class="preview-text"
      viewBox="0 0 1100 260"
      role="img"
      aria-label="Track your progress!"
    >
      <defs>
        <path id="downward-curve" d="M 80 92 Q 550 190 1020 92" />
      </defs>

      <text class="progress-text" fill="var(--fill)">
        <textPath href="#downward-curve" startOffset="50%" text-anchor="middle">
          Track your progress!
        </textPath>
      </text>
    </svg>
  </body>
</html>
