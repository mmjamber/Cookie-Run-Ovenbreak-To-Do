<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>No Mode Progress Preview</title>
    <link rel="stylesheet" href="list-progress-preview.css" />
  </head>
  <body>
    <main class="page none-preview" aria-label="No mode progress tracking preview">
      <section class="hero" aria-label="CookieRun OvenBreak">
        <img class="hero-background" src="images/homepage-banner-current.png" alt="" />
        <img class="hero-title" src="images/title.png" alt="CookieRun OvenBreak" />
        <nav class="hero-nav" aria-label="Main navigation">
          <button type="button">home</button>
          <button type="button">to-do</button>
          <button type="button">cookies</button>
        </nav>
      </section>

      <header class="page-header">
        <h1>No Mode</h1>
      </header>

      <div class="section-stack">
        <section>
          <h2 class="section-title">Individual Items</h2>
          <div class="individual-grid">
            <article class="individual-card">
              <div class="slot cookie filled" data-rarity="legendary">
                <div class="art-wrap"><img class="item-art" src="images/cookies/legendary/8-timekeeper-cookie.webp" alt="Timekeeper Cookie" /></div>
                <div class="level-control"><span class="level-text">Lv.13/<span class="level-target">15</span></span></div>
              </div>
            </article>
            <article class="individual-card">
              <div class="slot treasure filled" data-rarity="epic">
                <div class="art-wrap"><img class="item-art" src="images/treasures/epic/112-doughy-rolling-pin.png" alt="Doughy Rolling Pin" /></div>
                <div class="level-control"><span class="level-text is-complete">Lv.8/<span class="level-target">8</span></span></div>
              </div>
            </article>
            <article class="individual-card">
              <div class="slot pet empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add pet.png" alt="Add pet" /></div></div>
            </article>
            <article class="individual-card">
              <div class="slot cookie filled" data-rarity="rare">
                <div class="art-wrap"><img class="item-art" src="images/item-frame-preview/rare-cookie.webp" alt="Rare cookie placeholder" /></div>
                <div class="level-control"><span class="level-text">Lv.4/<span class="level-target">11</span></span></div>
              </div>
            </article>
          </div>
        </section>

        <section>
          <h2 class="section-title">Combis</h2>
          <div class="block-grid">
            <article class="block">
              <div class="combi">
                <div class="treasures">
                  <div class="slot treasure filled" data-rarity="legendary"><div class="art-wrap"><img class="item-art" src="images/treasures/legendary/8-dread-grasp-of-darkness.png" alt="Dread Grasp of Darkness" /></div><div class="level-control"><span class="level-text">Lv.7/<span class="level-target">10</span></span></div></div>
                  <div class="slot treasure empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add treasure.png" alt="Add treasure" /></div></div>
                  <div class="slot treasure filled" data-rarity="epic"><div class="art-wrap"><img class="item-art" src="images/treasures/epic/111-twirling-timepiece.png" alt="Twirling Timepiece" /></div><div class="level-control"><span class="level-text">Lv.6/<span class="level-target">9</span></span></div></div>
                </div>
                <div class="slot pet filled" data-rarity="common"><div class="art-wrap"><img class="item-art" src="images/item-frame-preview/common-pet.webp" alt="Common pet placeholder" /></div><div class="level-control"><span class="level-text">Lv.2/<span class="level-target">7</span></span></div></div>
                <div class="slot cookie filled" data-rarity="epic"><div class="art-wrap"><img class="item-art" src="images/cookies/epic/195-red-velvet.png" alt="Red Velvet Cookie" /></div><div class="level-control"><span class="level-text">Lv.14/<span class="level-target">15</span></span></div></div>
                <div class="slot relay empty-slot"><div class="art-wrap"><img class="empty-art" src="../assets/ovenbreak images/add cookies/add relay.png?v=2026-06-16-relay-2" alt="Add relay cookie" /></div></div>
              </div>
            </article>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
