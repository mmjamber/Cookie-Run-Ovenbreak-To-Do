<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curved Frame Test</title>
  <style>
    :root {
      --frame-color: #000;
      --outline-color: #8d8d8b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    .frame {
      width: min(78vw, 420px);
      aspect-ratio: 1;
    }

    .frame svg {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="frame" aria-label="Curved black frame with gray outline">
    <svg viewBox="0 0 420 420" role="img">
      <path
        fill="var(--outline-color)"
        d="M 78 0
           H 342
           C 394 0 420 26 420 78
           V 342
           C 420 394 394 420 342 420
           H 78
           C 26 420 0 394 0 342
           V 78
           C 0 26 26 0 78 0 Z"
      />
      <path
        fill="var(--frame-color)"
        d="M 84 10
           H 336
           C 385 10 410 35 410 84
           V 336
           C 410 385 385 410 336 410
           H 84
           C 35 410 10 385 10 336
           V 84
           C 10 35 35 10 84 10 Z"
      />
      <path
        fill="#fff"
        d="M 88 22
           H 332
           C 373 22 398 47 398 88
           V 332
           C 398 373 373 398 332 398
           H 88
           C 47 398 22 373 22 332
           V 88
           C 22 47 47 22 88 22 Z"
      />
    </svg>
  </div>
</body>
</html>
